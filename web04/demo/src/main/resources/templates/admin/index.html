<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { min-height: 100vh; background: #2c3e50; color: white; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover { background: #34495e; color: white; }
        .sidebar .active { background: #3498db; color: white; }
        .sidebar h4 { padding: 20px; margin: 0; border-bottom: 1px solid #34495e; font-size: 16px; }
        .card-stat { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .topbar { background: white; padding: 15px 25px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- 사이드바 -->
    <div class="sidebar" style="width: 220px; min-width: 220px;">
        <h4>관리자 메뉴</h4>
        <a th:href="@{/admin}" class="active">대시보드</a>
        <a th:href="@{/admin/members}">회원 관리</a>
        <a th:href="@{/admin/boards}">게시글 관리</a>
        <hr style="border-color: #34495e; margin: 10px 20px;">
        <a th:href="@{/}">사이트로 이동</a>
        <a th:href="@{/logout}">로그아웃</a>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="flex-grow-1">
        <div class="topbar">
            <h5 class="mb-0">관리자 대시보드</h5>
            <span class="text-muted">
                반갑습니다, <strong th:text="${session.loginMember.name}"></strong> 관리자님
            </span>
        </div>

        <div class="p-4">
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-4 text-center">
                        <div class="text-muted mb-1" style="font-size:14px;">전체 회원 수</div>
                        <div class="fw-bold" style="font-size:36px; color:#3498db;" th:text="${memberCount}">0</div>
                        <div class="mt-2">
                            <a th:href="@{/admin/members}" class="btn btn-outline-primary btn-sm">회원 관리</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-4 text-center">
                        <div class="text-muted mb-1" style="font-size:14px;">전체 게시글 수</div>
                        <div class="fw-bold" style="font-size:36px; color:#27ae60;" th:text="${boardCount}">0</div>
                        <div class="mt-2">
                            <a th:href="@{/admin/boards}" class="btn btn-outline-success btn-sm">게시글 관리</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card card-stat p-4 text-center">
                        <div class="text-muted mb-1" style="font-size:14px;">커뮤니티</div>
                        <div class="fw-bold" style="font-size:36px; color:#e74c3c;">3</div>
                        <div class="mt-2 text-muted" style="font-size:12px;">자유 · Q&A · 신고</div>
                    </div>
                </div>
            </div>

            <div class="card card-stat p-4">
                <h6 class="mb-3">빠른 링크</h6>
                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/community/free}" class="btn btn-outline-secondary btn-sm">자유게시판</a>
                    <a th:href="@{/community/qna}" class="btn btn-outline-secondary btn-sm">Q&amp;A</a>
                    <a th:href="@{/community/report}" class="btn btn-outline-secondary btn-sm">관광불편신고</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
