<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 관리 - 관리자</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { min-height: 100vh; background: #2c3e50; color: white; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover { background: #34495e; color: white; }
        .sidebar .active { background: #3498db; color: white; }
        .sidebar h4 { padding: 20px; margin: 0; border-bottom: 1px solid #34495e; font-size: 16px; }
        .topbar { background: white; padding: 15px 25px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar" style="width: 220px; min-width: 220px;">
        <h4>관리자 메뉴</h4>
        <a th:href="@{/admin}">대시보드</a>
        <a th:href="@{/admin/members}">회원 관리</a>
        <a th:href="@{/admin/boards}" class="active">게시글 관리</a>
        <hr style="border-color: #34495e; margin: 10px 20px;">
        <a th:href="@{/}">사이트로 이동</a>
        <a th:href="@{/logout}">로그아웃</a>
    </div>

    <div class="flex-grow-1">
        <div class="topbar">
            <h5 class="mb-0">게시글 관리</h5>
            <span class="text-muted">총 <strong th:text="${boards.size()}"></strong>건</span>
        </div>

        <div class="p-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>게시판</th>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>상태</th>
                            <th>작성일</th>
                            <th>관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(boards)}">
                            <td colspan="7" class="text-center py-4 text-muted">등록된 게시글이 없습니다.</td>
                        </tr>
                        <tr th:each="board : ${boards}">
                            <td th:text="${board.id}"></td>
                            <td>
                                <span th:if="${board.boardType.name() == 'FREE'}" class="badge bg-primary">자유</span>
                                <span th:if="${board.boardType.name() == 'QNA'}" class="badge bg-purple" style="background:#9b59b6;">Q&A</span>
                                <span th:if="${board.boardType.name() == 'REPORT'}" class="badge bg-danger">신고</span>
                            </td>
                            <td>
                                <a th:href="@{/community/{id}(id=${board.id})}" th:text="${board.title}" class="text-dark"></a>
                            </td>
                            <td th:text="${board.member.name}"></td>
                            <td>
                                <!-- Q&A 상태 변경 -->
                                <form th:if="${board.boardType.name() == 'QNA'}"
                                      th:action="@{/admin/boards/{id}/qna-status(id=${board.id})}" method="post"
                                      class="d-flex gap-1">
                                    <select name="status" class="form-select form-select-sm" style="width:auto;">
                                        <option th:selected="${board.qnaStatus == '답변대기'}" value="답변대기">답변대기</option>
                                        <option th:selected="${board.qnaStatus == '답변완료'}" value="답변완료">답변완료</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-outline-primary">변경</button>
                                </form>
                                <!-- REPORT 상태 변경 -->
                                <form th:if="${board.boardType.name() == 'REPORT'}"
                                      th:action="@{/admin/boards/{id}/report-step(id=${board.id})}" method="post"
                                      class="d-flex gap-1">
                                    <select name="step" class="form-select form-select-sm" style="width:auto;">
                                        <option th:selected="${board.reportStep == '접수'}" value="접수">접수</option>
                                        <option th:selected="${board.reportStep == '조사중'}" value="조사중">조사중</option>
                                        <option th:selected="${board.reportStep == '완료'}" value="완료">완료</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-outline-primary">변경</button>
                                </form>
                                <span th:if="${board.boardType.name() == 'FREE'}" class="text-muted">-</span>
                            </td>
                            <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}"></td>
                            <td>
                                <form th:action="@{/admin/boards/{id}/delete(id=${board.id})}" method="post"
                                      onsubmit="return confirm('삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
